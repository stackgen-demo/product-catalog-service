# product-catalog-service in aiden-demo (gRPC + Datadog APM/logs via shared datadog-agent).
# Prerequisite: order-service k8s/stack.yaml (namespace + datadog-agent + secret + log paths).
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-catalog-service
  namespace: aiden-demo
  labels:
    app: product-catalog-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-catalog-service
  template:
    metadata:
      labels:
        app: product-catalog-service
      annotations:
        ad.datadoghq.com/product-catalog-service.logs: '[{"source":"go","service":"product-catalog-service","tags":["env:demo"]}]'
    spec:
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: aiden-demo
              topologyKey: kubernetes.io/hostname
      containers:
        - name: product-catalog-service
          image: ghcr.io/stackgen-demo/product-catalog-service:latest
          imagePullPolicy: Always
          ports:
            - name: grpc
              containerPort: 3550
          env:
            - name: PRODUCT_CATALOG_PORT
              value: "3550"
            - name: DD_SERVICE
              value: product-catalog-service
            - name: DD_ENV
              value: demo
            - name: DD_AGENT_HOST
              value: datadog-agent
            - name: DD_TRACE_AGENT_PORT
              value: "8126"
            - name: DD_TRACE_ENABLED
              value: "true"
            - name: DD_LOGS_INJECTION
              value: "true"
            - name: DD_TRACE_PROPAGATION_STYLE
              value: "datadog,tracecontext"
            - name: CATALOG_DEMO_FAULT
              value: ""
            - name: CATALOG_FAILURE_FRACTION
              value: "0.05"
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: product-catalog-service
  namespace: aiden-demo
spec:
  selector:
    app: product-catalog-service
  ports:
    - name: grpc
      port: 3550
      targetPort: grpc
