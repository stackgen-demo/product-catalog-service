# Shared Datadog file-log tail config for aiden-demo workloads.
# Apply after order-service k8s/stack.yaml (updates datadog-agent-logs ConfigMap).
apiVersion: v1
kind: ConfigMap
metadata:
  name: datadog-agent-logs
  namespace: aiden-demo
data:
  conf.yaml: |
    logs:
      - type: file
        path: /var/log/pods/**/aiden-demo/*.log
        service: order-service
        source: go
        tags:
          - env:demo
      - type: file
        path: /var/log/pods/**/payment-service/*.log
        service: payment-service
        source: nodejs
        tags:
          - env:demo
      - type: file
        path: /var/log/pods/**/product-catalog-service/*.log
        service: product-catalog-service
        source: go
        tags:
          - env:demo
      - type: file
        path: /var/log/pods/**/ad-service/*.log
        service: ad-service
        source: java
        tags:
          - env:demo
